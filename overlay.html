<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scribe Goblin Overlay</title>
    <link rel="stylesheet" href="/src/overlay.css" />
    <script type="module" src="/src/overlay.ts" defer></script>
    <style>
      :root {
        --overlay-bg: var(--surface-raised, var(--bg-section));
        --overlay-border: var(--border);
        --overlay-shadow: var(--shadow-card, 0 8px 32px rgba(0, 0, 0, 0.3));
        --overlay-item-hover: var(--surface-sunken, var(--bg-input));
        --overlay-item-selected: var(--surface-sunken, var(--bg-input));
        --overlay-input-bg: var(--surface-sunken, var(--bg-input));
        --overlay-footer-bg: var(--surface-sunken, var(--bg-input));
        --overlay-text: var(--text-base, var(--text));
        --overlay-text-subtle: var(--text-subtle, var(--text));
        --overlay-text-muted: var(--text-muted);
        --overlay-accent: var(--accent);
        --overlay-warning: var(--warning);
        --overlay-kbd-bg: var(--bg-input);
      }

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--overlay-text-subtle);
      }

      .overlay-container {
        width: 400px;
        height: 500px;
        background: var(--overlay-bg);
        border: 1px solid var(--overlay-border);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        box-shadow: var(--overlay-shadow);
        backdrop-filter: blur(10px);
      }

      .search-header {
        padding: 12px;
        border-bottom: 1px solid var(--overlay-border);
      }

      .search-input {
        width: 100%;
        background: var(--overlay-input-bg);
        border: 1px solid var(--overlay-border);
        border-radius: 6px;
        padding: 8px 12px;
        color: var(--overlay-text);
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
      }

      .search-input:focus {
        border-color: var(--overlay-accent);
      }

      .results-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }

      .result-item {
        padding: 10px 16px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 4px;
        transition: background 0.1s;
      }

      .result-item:hover {
        background: var(--overlay-item-hover);
      }

      .result-item.is-selected {
        background: var(--overlay-item-selected);
        border-left: 3px solid var(--overlay-accent);
      }

      .result-content {
        font-size: 13px;
        line-height: 1.4;
        color: var(--overlay-text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .masked-content { display: none; }
      .result-item.is-secret .unmasked-content { display: none; }
      .result-item.is-secret .masked-content { display: inline; color: var(--overlay-text-muted); font-family: monospace; letter-spacing: 2px; }

      body.alt-pressed .result-item.is-secret .unmasked-content { display: inline; }
      body.alt-pressed .result-item.is-secret .masked-content { display: none; }

      .result-meta {
        font-size: 11px;
        color: var(--overlay-text-muted);
        display: flex;
        justify-content: space-between;
      }

      .overlay-footer {
        padding: 8px 12px;
        font-size: 11px;
        color: var(--overlay-text-muted);
        border-top: 1px solid var(--overlay-border);
        background: var(--overlay-footer-bg);
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .overlay-footer-left {
        display: flex;
        gap: 12px;
      }

      .overlay-footer-hint {
        color: var(--overlay-accent);
        white-space: nowrap;
      }

      .result-attachment-hint {
        font-size: 11px;
        color: var(--overlay-warning);
      }

      kbd {
        background: var(--overlay-kbd-bg);
        border: 1px solid var(--overlay-border);
        border-radius: 3px;
        padding: 1px 4px;
        color: var(--overlay-accent);
        font-family: inherit;
      }

      /* Scrollbar */
      .results-list::-webkit-scrollbar {
        width: 6px;
      }
      .results-list::-webkit-scrollbar-thumb {
        background: var(--overlay-border);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="overlay-container">
      <div class="search-header">
        <input type="text" id="overlay-search" class="search-input" placeholder="Search clipboard history..." autocomplete="off" />
      </div>
      <div id="results-list" class="results-list">
        <!-- Results will be injected here -->
      </div>
      <div class="overlay-footer">
        <div class="overlay-footer-left">
          <span><kbd id="overlay-footer-paste-key">Enter</kbd> <span id="overlay-footer-hint" class="overlay-footer-hint">Paste</span></span>
          <span><kbd id="overlay-footer-delete-key">Del</kbd> Delete</span>
        </div>
        <span><kbd id="overlay-footer-close-key">Esc</kbd> Close</span>
      </div>
    </div>
  </body>
</html>
