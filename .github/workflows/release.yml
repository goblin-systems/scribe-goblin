name: Release

# Builds every distributable variant and publishes a GitHub release.
#
#   Windows : vulkan, cuda
#   Linux   : vulkan, cuda, rocm
#   macOS   : metal
#
# Every build also includes the mistral.rs CPU engine, so a user can fall back
# to CPU from the UI in any build — there is no separate CPU-only artifact.
#
# GPU backends:
#   • vulkan — llama.cpp + Vulkan. Cross-vendor (AMD + NVIDIA + Intel). On
#              Windows this is the AMD path. (Win + Linux)
#   • cuda   — llama.cpp + CUDA. NVIDIA only. (Win + Linux)
#   • rocm   — llama.cpp + ROCm/HIP. AMD only, Linux only.
#   • metal  — mistral.rs + Metal. Apple GPU. (macOS only)
#
# Trigger manually (workflow_dispatch); the prepare job bumps the version,
# commits, tags, and the build/publish jobs fan out from that tag.

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: minor
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify master branch
        if: ${{ github.ref_name != 'master' }}
        run: |
          echo "This workflow must be run from the master branch."
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # See ci.yml for why this swap is needed (workspace:* cannot resolve in a
      # standalone checkout). This job never commits, so no restore is needed.
      - name: Pin design system to published version (standalone build)
        shell: bash
        run: node -e "const fs=require('fs');fs.writeFileSync('package.json',fs.readFileSync('package.json','utf8').replace('workspace:*','^1.0.0'))"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build frontend
        run: bun run build

      - name: Determine next version
        id: version
        shell: pwsh
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}
        run: |
          git fetch --tags --force

          $latestTag = git tag --list 'v*' --sort=-v:refname | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($latestTag)) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $baseVersion = $pkg.version
          }
          else {
            $baseVersion = $latestTag.TrimStart('v')
          }

          if ($baseVersion -notmatch '^(\d+)\.(\d+)\.(\d+)$') {
            throw "Unable to parse semantic version from '$baseVersion'"
          }

          $major = [int]$Matches[1]
          $minor = [int]$Matches[2]
          $patch = [int]$Matches[3]

          switch ($env:BUMP_TYPE) {
            'major' {
              $major += 1
              $minor = 0
              $patch = 0
            }
            'minor' {
              $minor += 1
              $patch = 0
            }
            'patch' {
              $patch += 1
            }
            default {
              throw "Unsupported bump type '$($env:BUMP_TYPE)'"
            }
          }

          $newVersion = "$major.$minor.$patch"
          $newTag = "v$newVersion"

          "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "new_tag=$newTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "Latest tag: $latestTag"
          Write-Host "Next version: $newVersion"

      # Version numbers are derived from git tags, not committed to the repo.
      # The build job patches the version into package.json / tauri.conf.json /
      # Cargo.toml at build time (never committed), so the release is driven
      # purely by the tag and master gets no extra "chore: release" commits.
      - name: Create and push tag
        shell: pwsh
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          $tag = $env:NEW_TAG.Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "NEW_TAG output is empty"
          }

          git show-ref --tags --verify --quiet "refs/tags/$tag"
          if ($LASTEXITCODE -eq 0) {
            throw "Tag $tag already exists"
          }

          git tag $tag
          git push origin $tag

  build:
    name: ${{ matrix.os }} / ${{ matrix.variant }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      # crates.io downloads intermittently fail over HTTP/2 on hosted runners
      # ("Failed receiving HTTP2 data"); force HTTP/1.1 and retry aggressively.
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows ----
          - os: windows-latest
            variant: vulkan
            features: "--features llamacpp-vulkan"
            bundles: nsis
            vulkan: true
            ninja: true
          # Pinned to windows-2022: the CUDA 12.5 installer fails on the
          # windows-latest image (now Windows Server 2025) with exit code
          # 3772776473. Server 2022 installs the toolkit cleanly.
          - os: windows-2022
            variant: cuda
            features: "--features llamacpp-cuda"
            bundles: nsis
            cuda: true
            ninja: true
          # ---- Linux ----
          - os: ubuntu-24.04
            variant: vulkan
            features: "--features llamacpp-vulkan"
            bundles: deb,appimage
            vulkan: true
            ninja: true
          - os: ubuntu-24.04
            variant: cuda
            features: "--features llamacpp-cuda"
            bundles: deb,appimage
            cuda: true
            ninja: true
          - os: ubuntu-24.04
            variant: rocm
            features: "--features llamacpp-rocm"
            bundles: deb,appimage
            rocm: true
            ninja: true
          # ---- macOS ----
          - os: macos-latest
            variant: metal
            features: "--features metal"
            bundles: dmg
            xcode: true

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.new_tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}-${{ matrix.variant }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgbm-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfuse2t64 \
            patchelf

      # Full Xcode (not just Command Line Tools) provides `xcrun metal`, required
      # to compile mistral.rs's Metal shaders.
      - name: Select Xcode
        if: matrix.xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # llama.cpp's Vulkan backend is compiled from source and needs the SDK
      # (headers + glslc) at build time. Works on both Windows and Linux runners.
      - name: Install Vulkan SDK
        if: matrix.vulkan
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.296.0
          install_runtime: true
          cache: true

      # llama.cpp's CUDA backend compiles with nvcc. Only the toolkit is needed
      # at build time — no GPU is required to compile. The toolkit is installed
      # differently per OS because the package naming differs:
      #   Windows — Jimver action with the installer's subpackage names.
      #   Linux   — apt `cuda-toolkit-12-5` meta (NVIDIA's lib* packaging does
      #             not match the action's `cuda-<name>` mapping, and the meta
      #             pulls nvcc + cudart + cublas + nvrtc without the GPU driver).
      - name: Install CUDA toolkit (Windows)
        if: matrix.cuda && runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.5.0"
          method: network
          use-github-cache: false
          use-local-cache: false
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "cuda_nvrtc", "cuda_nvrtc_dev", "cuda_cccl", "thrust"]'

      - name: Install CUDA toolkit (Linux)
        if: matrix.cuda && runner.os == 'Linux'
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-5
          echo "/usr/local/cuda-12.5/bin" >> "$GITHUB_PATH"
          echo "CUDA_PATH=/usr/local/cuda-12.5" >> "$GITHUB_ENV"

      # llama.cpp's ROCm/HIP backend needs AMD's ROCm toolchain. We install the
      # `rocm-hip-sdk` metapackage straight from AMD's apt repo — that is the
      # compile-time SDK (hipcc + hipBLAS/rocBLAS dev) with no kernel driver, so
      # no GPU/DKMS is required to build. ROCm must be >= 6.3: the HIP backend
      # references the OCP FP8 type `__hip_fp8_e4m3`, which older ROCm (6.2) does
      # not define (it only has the `_fnuz` variant), breaking the compile.
      # AMDGPU_TARGETS pins the GPU archs so cmake does not try to autodetect a
      # (non-existent) local GPU.
      - name: Install ROCm
        if: matrix.rocm
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          sudo mkdir --parents --mode=0755 /etc/apt/keyrings
          wget https://repo.radeon.com/rocm/rocm.gpg.key -O - | gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.4.1 noble main" | sudo tee /etc/apt/sources.list.d/rocm.list
          printf 'Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600\n' | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt-get update
          sudo apt-get install -y rocm-hip-sdk
          echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "HIP_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "/opt/rocm/bin" >> "$GITHUB_PATH"
          echo "AMDGPU_TARGETS=gfx906;gfx908;gfx90a;gfx1030;gfx1100;gfx1101;gfx1102" >> "$GITHUB_ENV"

      # All llamacpp-* builds drive CMake through the Ninja generator (forced by
      # src-tauri/.cargo/config.toml); the standard/metal builds never invoke it.
      - name: Install Ninja
        if: matrix.ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      # See ci.yml: rewrite workspace:* -> published version for standalone build.
      - name: Pin design system to published version (standalone build)
        shell: bash
        run: node -e "const fs=require('fs');fs.writeFileSync('package.json',fs.readFileSync('package.json','utf8').replace('workspace:*','^1.0.0'))"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Stamp the version derived from the tag into the build inputs. These edits
      # are ephemeral (this checkout is the tag and is never pushed), so the
      # version lives only in the produced artifacts — not in the repo history.
      - name: Update version files
        shell: pwsh
        env:
          NEW_VERSION: ${{ needs.prepare.outputs.new_version }}
        run: |
          $version = $env:NEW_VERSION

          $packagePath = 'package.json'
          $package = Get-Content $packagePath -Raw | ConvertFrom-Json
          $package.version = $version
          $package | ConvertTo-Json -Depth 50 | Set-Content $packagePath -Encoding utf8

          $tauriPath = 'src-tauri/tauri.conf.json'
          $tauri = Get-Content $tauriPath -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 50 | Set-Content $tauriPath -Encoding utf8

          $cargoPath = 'src-tauri/Cargo.toml'
          $cargo = Get-Content $cargoPath -Raw
          $cargo = [regex]::Replace($cargo, '(?ms)(\[package\][^\[]*?version\s*=\s*")([^"]+)(")', "`${1}$version`${3}")
          Set-Content $cargoPath -Value $cargo -Encoding utf8

          Write-Host "Version files stamped to $version"

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        run: bun run tauri build --ci --no-sign --bundles ${{ matrix.bundles }} ${{ matrix.features }}

      # Collect every produced bundle and tag it with the variant name so files
      # from different variants do not collide in the release.
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist-artifacts
          shopt -s nullglob
          suffix="${{ matrix.variant }}"
          for f in \
            src-tauri/target/release/bundle/nsis/*.exe \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/dmg/*.dmg; do
            [ -e "$f" ] || continue
            base="$(basename "$f")"
            name="${base%.*}"
            ext="${base##*.}"
            cp "$f" "dist-artifacts/${name}-${suffix}.${ext}"
          done
          ls -la dist-artifacts

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scribe-goblin-${{ matrix.os }}-${{ matrix.variant }}
          path: dist-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scribe-goblin-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.new_tag }}
          name: Scribe Goblin ${{ needs.prepare.outputs.new_tag }}
          generate_release_notes: true
          body: |
            ## Downloads

            Every build can also run on **CPU** (mistral.rs) — selectable in the
            app — so pick the build that matches your GPU.

            **Don't know which to pick?** On Windows/Linux choose **Vulkan** (works
            on AMD, NVIDIA and Intel). On macOS use **Metal**.

            ### Windows
            - `*-vulkan-setup.exe` — Vulkan. **AMD users pick this** (also works on NVIDIA / Intel)
            - `*-cuda-setup.exe` — CUDA (NVIDIA only, fastest on NVIDIA)

            ### Linux
            - `*-vulkan.*` — Vulkan (AMD / NVIDIA / Intel)
            - `*-cuda.*` — CUDA (NVIDIA only)
            - `*-rocm.*` — ROCm (AMD only, native AMD path)

            ### macOS
            - `*-metal.dmg` — Metal (Apple Silicon / AMD GPUs)
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.AppImage
