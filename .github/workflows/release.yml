name: Release builds

# Produces two Windows installers:
#   • standard        — CPU / mistral.rs (the default download)
#   • llamacpp-vulkan — GPU build (llama.cpp + Vulkan). AMD users download this
#                       one; Vulkan also covers NVIDIA and Intel GPUs.
#
# Trigger manually (workflow_dispatch) or by pushing a v* tag.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    name: windows-${{ matrix.variant }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            build_script: tauri:build
            needs_vulkan: false
          - variant: llamacpp-vulkan
            build_script: tauri:build:vulkan
            needs_vulkan: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.variant }}

      # llama.cpp's Vulkan backend is compiled from source and needs the SDK
      # (headers + glslc) at build time. Not required for the standard build.
      - name: Install Vulkan SDK
        if: matrix.needs_vulkan
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.296.0
          install_runtime: true
          cache: true

      # llama.cpp must build with the Ninja generator on Windows (the VS/MSBuild
      # generator fails building vulkan-shaders-gen). CMAKE_GENERATOR=Ninja is set
      # via src-tauri/.cargo/config.toml; this puts Ninja on PATH.
      - name: Install Ninja
        if: matrix.needs_vulkan
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run ${{ matrix.build_script }}

      - name: Collect installer
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # Default target dir; CI has no machine-local CARGO_TARGET_DIR override.
          cp src-tauri/target/release/bundle/nsis/*.exe dist-artifacts/ 2>/dev/null || true
          if [ "${{ matrix.variant }}" = "llamacpp-vulkan" ]; then
            for f in dist-artifacts/*.exe; do
              [ -e "$f" ] || continue
              mv "$f" "${f%-setup.exe}-llamacpp-vulkan-GPU-setup.exe"
            done
          fi
          ls -la dist-artifacts

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: scribe-goblin-${{ matrix.variant }}
          path: dist-artifacts/*.exe
          if-no-files-found: error

      # On a tagged push, attach both installers to the GitHub release. The
      # Vulkan asset is the one AMD/NVIDIA/Intel GPU users should download; the
      # standard asset is CPU-only (mistral.rs).
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*.exe
          body: |
            **Downloads**
            - `*-setup.exe` — standard build (CPU / mistral.rs).
            - `*-llamacpp-vulkan-GPU-setup.exe` — GPU build (llama.cpp + Vulkan).
              **AMD users download this one** (also works on NVIDIA / Intel GPUs).
